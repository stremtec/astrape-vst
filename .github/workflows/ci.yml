name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true  # pre-existing lint debt — advisory only
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - run: uv sync --only-dev
      - run: uv run ruff check astrape/ tests/ export.py
      - run: uv run ruff format --check astrape/ tests/ export.py

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true  # pre-existing type debt — advisory only
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - run: uv sync
      - run: uv run mypy astrape/ --ignore-missing-imports

  import-check:
    name: Import check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - run: uv sync
      - name: Verify all modules import
        run: |
          uv run python3 << 'PYEOF'
          import sys, importlib, pathlib, traceback

          # External MioCodec needed by absolute miocodec imports
          sys.path.insert(0, str(pathlib.Path("external/MioCodec/src").resolve()))

          pkg = pathlib.Path('astrape')
          ok = 0
          warn = 0
          fail = 0
          for f in sorted(pkg.rglob('*.py')):
              if '__pycache__' in f.parts:
                  continue
              if f.name.startswith('_') or f.name == '__init__.py':
                  continue
              mod = '.'.join(f.relative_to(pkg.parent).with_suffix('').parts)
              try:
                  importlib.import_module(mod)
                  print(f'  OK  {mod}')
                  ok += 1
              except ModuleNotFoundError as e:
                  print(f'  WARN  {mod}: {e} (missing dep)', file=sys.stderr)
                  warn += 1
              except Exception as e:
                  print(f'  FAIL  {mod}: {e}', file=sys.stderr)
                  traceback.print_exc()
                  fail += 1
          print(f'\n{ok} OK, {warn} skipped (deps), {fail} FAIL')
          sys.exit(0 if fail == 0 else 1)
          PYEOF

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync
      - name: Run streaming invariance tests
        run: uv run python tests/test_streaming_invariant.py
      - name: Run pytests
        run: uv run pytest tests/ -v --tb=short --timeout=120 --no-header || [ $? -eq 5 ]
